<!-- 
 This file contains the structure for the login page of the Recipe Management Application.
 It provides a form for users to enter their credentials and log into the system.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe Management App</title>
</head>
<body>

    <!-- TODO: Add main heading for the page -->
    <h1>Login</h1>

    <!-- TODO: Create an input field for username -->
    <!-- - Use <input> with id="login-input" and appropriate placeholder -->
    <input id="login-input" placeholder="Username">

    <!-- TODO: Create an input field for password -->
    <!-- - Use <input type="password"> with id="password-input" -->
    <input id="password-input" type="password" placeholder="password">

    <!-- TODO: Create a login button -->
    <!-- - Use <button> with id="login-button" -->
    <button type="button" id="login-button">Login</button>

    <!-- TODO: Add an optional hidden logout button with id="logout-button" -->
    <!-- - Can be revealed if needed during token testing or logout support -->
    <button type="button" id="logout-button" style="display: none">Logout</button>

    <!-- Link JS script -->
    <script src="login-page.js"></script>
</body>
</html>


<!-- 
### 2️⃣ User Login and Logout

📂 Location: `frontend/login/` and `frontend/recipe/`

Files:

- `login-page.html`, `login-page.js`
- `recipe-page.html`, `recipe-page.js`

**Requirements:**

- Login form should include username and password fields
- JS should:

  - Create a login request with `username` and `password`
  - Send a POST request to `http://localhost:8081/login`
  - On success:
    - Parse the response (token and admin flag separated by space)
    - Store token in `sessionStorage` under `auth-token`
    - Store admin flag under `is-admin`
    - Redirect to the recipe page
  - On failure: show an alert

- Logout logic (in `recipe-page.js`) should:
  - Send POST request to `/logout` with auth token
  - Clear `sessionStorage` keys
  - Redirect to login page

--- -->
