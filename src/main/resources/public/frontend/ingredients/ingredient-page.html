<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients - Recipe Management App</title>
    <link rel="stylesheet" href="ingredient-page.css">
</head>
<body>

    <!-- A link back to the recipe page with an id of "back-link" -->
    <a id="back-link" href="../recipe/recipe-page.html">← Back to Recipes</a>
    
    <!-- Heading -->
    <h1>Ingredients</h1>

    <section>
        <h2>Ingredients</h2>
        <ul id="ingredient-list"></ul>
    </section>

    <!-- A section to add a new ingredient -->
      <section>
        <h2>Add an Ingredient</h2>
        <input id="add-ingredient-name-input" placeholder="Ingredient name">
        <button id="add-ingredient-submit-button">Add</button>
    </section>

    <!--   A section to delete an ingredient -->
        <section>
        <h2>Delete an Ingredient</h2>
        <input id="delete-ingredient-name-input" placeholder="Ingredient name">
        <button id="delete-ingredient-submit-button">Delete</button>
    </section>

    <script src="ingredient-page.js"></script>
</body>
</html>
