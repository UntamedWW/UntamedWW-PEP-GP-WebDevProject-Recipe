<!-- 
 This file contains the structure for the main register page of the Recipe Management Application,
 providing a user registration form with fields for username, email, and password.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - User Registration Page</title>
    <link rel="stylesheet" href="register-page.css">
</head>
<body>

    <!-- Header -->
     <h1>Register</h1>

    <!-- Add a label or paragraph for "Username" -->
    <label>Username</label>
    <!-- Add an input element for username with id="username-input" -->
    <input type="text" id="username-input">

    <!-- Add a label or paragraph for "Email" -->
    <label>Email</label>
    <!-- Add an input element for email with id="email-input" and type="email" -->
    <input type="email" id="email-input">

    <!-- Add a label or paragraph for "Password" -->
    <label for="passwordInput">Password</label>
    <!-- Add an input element for password with id="password-input" and type="password" -->
    <input type="password" id="password-input">

    <!-- Add a label or paragraph for "Repeat Password" -->
    <label for="password-input">Repeat Password</label>
    <!-- Add an input element for repeat password with id="repeat-password-input" and type="password" -->
    <input type="password" id="repeat-password-input">

    <!-- Add a register button with id="register-button" and text "Register" -->
    <button type="button" id="register-button">Register</button>

    <script src="register-page.js"></script>
</body>
</html>
