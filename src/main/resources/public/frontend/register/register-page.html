<!-- 
 This file contains the structure for the main register page of the Recipe Management Application,
 providing a user registration form with fields for username, email, and password.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - User Registration Page</title>
    <link rel="stylesheet" href="register-page.css">
</head>
<body>

    <!-- TODO: Add a heading (h1) with text "Register" -->
     <h1>Register</h1>

    <!-- TODO: Add a label or paragraph for "Username" -->
    <label for="usernameInput">Username</label>
    <!-- TODO: Add an input element for username with id="username-input" -->
    <input type="text" id="usernameInput">

    <!-- TODO: Add a label or paragraph for "Email" -->
    <label for="emailInput">Email</label>
    <!-- TODO: Add an input element for email with id="email-input" and type="email" -->
    <input type="email" id="emailInput">

    <!-- TODO: Add a label or paragraph for "Password" -->
    <label for="passwordInput">Password</label>
    <!-- TODO: Add an input element for password with id="password-input" and type="password" -->
    <input type="password" id="passwordInput">

    <!-- TODO: Add a label or paragraph for "Repeat Password" -->
    <label for="passwordInput">Repeat Password</label>
    <!-- TODO: Add an input element for repeat password with id="repeat-password-input" and type="password" -->
    <input type="password" id="repeatPasswordInput">

    <!-- TODO: Add a register button with id="register-button" and text "Register" -->
    <button type="button" id="registerButton">Register</button>

    <script src="register-page.js"></script>
</body>
</html>

<!-- 

**Requirements:**

- Registration form should include:
  - Username, Email, Password, Repeat Password fields
  - Submit button with ID `register-button`
- JS should:
  - Validate that all inputs are filled
  - Ensure password and repeated password match
  - Create a registration object and send a POST request to `http://localhost:8081/register`
  - On success: redirect to login page
  - On failure: show an alert 
  
  -->
