<!-- 
 This file contains the structure for the main recipe management page of the Recipe Management Application.
 It provides interfaces for viewing, adding, updating, deleting, and searching recipes.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes - Recipe Management App</title>
    <link rel="stylesheet" href="recipe-page.css">
</head>

<body>

    <!-- A hidden link with id="admin-link" to navigate to the ingredients page (admin only) -->
    <a href="../ingredients/ingredient-page.html" id="admin-link" style="display: none;">Ingredients</a>

    <!-- A hidden Logout button with id="logout-button" -->
    <button id="logout-button" style="display: none;">Logout</button>

    <!-- An h1 heading for the Recipe Management section -->
    <h1>Recipes Management</h1>

    <h2>Search a recipe</h2>
    <input id="search-input">
    <button id="search-button">Search</button>

    <ul id="recipe-list"></ul>

    <h2>Add a Recipe</h2>
    <input id="add-recipe-name-input" placeholder="Add recipe name">
    <textarea id="add-recipe-instructions-input" placeholder="Instructions"></textarea>
    <button type="submit" id="add-recipe-submit-input">Add Recipe</button>

    <h2>Update a Recipe</h2>
    <input id="update-recipe-name-input" placeholder="Update recipe name">
    <textarea id="update-recipe-instructions-input" placeholder="Write updated instructions"></textarea>
    <button type="submit" id="update-recipe-submit-input">Update Recipe</button>

    <h2>Delete a Recipe</h2>
    <input id="delete-recipe-name-input" placeholder="Write the name of the recipe">
    <button type="button" id="delete-recipe-submit-input">Delete Recipe</button>

    <script src="recipe-page.js"></script>
</body>

</html>
